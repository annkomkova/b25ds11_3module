<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      svg rect {
        transition: all ease 1s;
        border-radius: 0%;
      }
      svg rect:hover {
        border-radius: 100%;
        transition: all ease 1s;
      }
    </style>
  </head>
  <body>
    <svg
      width="96"
      height="72"
      viewBox="0 0 96 72"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
    >
      <rect width="24" height="24" fill="#D9D9D9" />
      <rect y="24" width="24" height="24" fill="#E46161" />
      <rect y="48" width="24" height="24" fill="#D9D9D9" />
      <rect x="24" width="24" height="24" fill="#E46161" />
      <rect x="24" y="24" width="24" height="24" fill="#D9D9D9" />
      <rect x="24" y="48" width="24" height="24" fill="#E46161" />
      <rect x="48" width="24" height="24" fill="#D9D9D9" />
      <rect x="48" y="24" width="24" height="24" fill="#E46161" />
      <rect x="48" y="48" width="24" height="24" fill="#D9D9D9" />
      <rect x="72" width="24" height="24" fill="#E46161" />
      <rect x="72" y="24" width="24" height="24" fill="#D9D9D9" />
      <rect x="72" y="48" width="24" height="24" fill="#E46161" />
    </svg>
  </body>
</html>
