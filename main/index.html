<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Анимации CSS & JS</title>
    <link rel="stylesheet" href="stylesheets/style.css" />
    <script defer src="javascripts/scripts.js"></script>
  </head>
  <body>
    <section class="header">
      <h1>
        <span>a</span>
        <span>n</span>
        <span>i</span>
        <span>m</span>
        <span>a</span>
        <span>t</span>
        <span>i</span>
        <span>o</span>
        <span>n</span>
      </h1>
    </section>

    <section class="flipCards">
      <article class="flipCard">
        <div class="flipCardWrapper">
          <div class="flipCardFront">
            <p>голубой</p>
          </div>

          <div class="flipCardBack blue"></div>
        </div>
      </article>

      <article class="flipCard">
        <div class="flipCardWrapper">
          <div class="flipCardFront">
            <p>розовый</p>
          </div>

          <div class="flipCardBack purple"></div>
        </div>
      </article>

      <article class="flipCard">
        <div class="flipCardWrapper">
          <div class="flipCardFront">
            <p>желтый</p>
          </div>

          <div class="flipCardBack yellow"></div>
        </div>
      </article>

      <article class="flipCard">
        <div class="flipCardWrapper">
          <div class="flipCardFront">
            <p>зелёный</p>
          </div>

          <div class="flipCardBack green"></div>
        </div>
      </article>
    </section>

    <section class="progressBarWrapper">
      <button class="progressBarButton">клик</button>

      <div class="progressBar">
        <div class="progress"></div>
        <p class="progressNumber">0%</p>
      </div>
    </section>

    <section class="drawSVG">
      <svg
        width="119"
        height="113"
        viewBox="0 0 119 113"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        class="starWrapper"
      >
        <path
          class="star"
          d="M71.6728 40.7144C72.2083 42.3623 73.7439 43.4779 75.4765 43.4781H116.184L83.2509 67.4048C81.8491 68.4234 81.2623 70.2294 81.7978 71.8775L94.3769 110.591L61.4453 86.6646C60.0433 85.646 58.1441 85.646 56.7422 86.6646L23.8105 110.591L36.3896 71.8775C36.9251 70.2294 36.3384 68.4234 34.9365 67.4048L2.00388 43.4781H42.7109C44.4436 43.4779 45.9791 42.3623 46.5146 40.7144L59.0937 1.99954L71.6728 40.7144Z"
          stroke="#4CC9F0"
          stroke-width="4"
        />
      </svg>
    </section>
  </body>
</html>
